name: Joke Action
run-name: Dad Joke for issue ${{github.event.issue.number}} by ${{github.event.comment.user.login}}

on:
issue_comment:
types:[created]

permissions:
issues: write
contents: read

jobs:
joke:
if: startWith(github.evnet.comment.body, '/joke')
run-on: ubentu-latest
steps:
-uses: action/checkout@v5
-name: Get Joke
id: get-joke
uses: ./
-name: Create comment
uses: peter-evans/create-or-update-comment@v5
with:
issue-number: ${{ github.evnet.issue.number }}
body:${{ steps.get-joke.outputs.joke }}